<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Spotify Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .spotify-green { background-color: #1DB954; }
        .spotify-green:hover { background-color: #1ed760; }
    </style>
</head>
<body class="flex items-center justify-center h-screen m-0">

    <div class="bg-[#181818] p-10 rounded-xl shadow-2xl max-w-md w-full text-center border border-gray-800">
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" alt="Spotify" class="h-12 mx-auto mb-8">
        
        <div id="step-login">
            <h1 class="text-2xl font-bold mb-4">Link Rust to Spotify</h1>
            <p class="text-gray-400 mb-8 text-sm">Authorize your account to control music using in-game wall buttons inside your Rust base.</p>
            <button onclick="loginWithSpotify()" class="spotify-green text-black font-bold py-3 px-8 rounded-full transition duration-300 shadow-lg w-full">
                Connect Spotify Account
            </button>
        </div>

        <div id="step-code" class="hidden">
            <h1 class="text-2xl font-bold mb-4">Account Verified!</h1>
            <p class="text-gray-400 mb-6 text-sm">Click the button below to copy your unique command, then paste it into the Rust in-game chat.</p>
            
            <button onclick="copyCommand()" class="spotify-green text-black font-bold py-4 px-6 rounded-full transition duration-300 w-full text-lg shadow-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                Copy In-Game Command
            </button>
            <p id="copy-status" class="text-md text-[#1DB954] mt-4 font-bold hidden">Copied! Now paste it in Rust (Ctrl+V)</p>
            
            <!-- Hidden input that stores the command so the player doesn't have to look at the ugly long code -->
            <input type="hidden" id="auth-command" value="">
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: CHANGE THIS!
        // ==========================================
        const CLIENT_ID = "2a31097ec0e64dc99ba46002bac64623"; 
        
        // Ensure this exactly matches your Spotify Dashboard Redirect URI (Keep the slash!)
        const REDIRECT_URI = "https://belisario-afk.github.io/spotify-rust-auth/"; 

        function loginWithSpotify() {
            const scope = "user-modify-playback-state";
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
            window.location.href = authUrl;
        }

        function checkUrlForCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                document.getElementById('step-login').classList.add('hidden');
                document.getElementById('step-code').classList.remove('hidden');
                
                // Set the shorter command into the hidden input
                document.getElementById('auth-command').value = `/sp auth ${code}`;
                
                // Clear the URL for security/cleanliness
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function copyCommand() {
            const cmd = document.getElementById('auth-command').value;
            navigator.clipboard.writeText(cmd).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.remove('hidden');
            });
        }

        window.onload = checkUrlForCode;
    </script>
</body>
</html>
